name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # SQLite for CI: prisma generate + tsc + tests + build never connect to a
      # real DB, so a file URL is sufficient (and the build's prisma-prepare picks
      # the SQLite schema for non-postgres URLs).
      DATABASE_URL: "file:./dev.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
